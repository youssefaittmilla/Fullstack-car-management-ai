apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-crud-deployment
spec:
  selector:
    matchLabels:
      app: springboot-k8s-mysql
  replicas: 3
  template:
    metadata:
      labels:
        app: springboot-k8s-mysql
    spec:
      containers:
      - name: springboot-crud-k8s
        image: springboot-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: MYSQL_HOST
          value: mysqldb
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_DB
          value: miola
        - name: MYSQL_USER
          value: root
        - name: MYSQL_PASSWORD
          value: root
        - name: GROQ_API_KEY
          value: "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"
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-crud-svc
spec:
  selector:
    app: springboot-k8s-mysql
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
  type: NodePort